<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Marlift Empilhadeiras - OS Profissional</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* Estilos (mesmos do sistema original, mantidos) */
    * { -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #0c0f12;
      --bg-secondary: #141a21;
      --fg: #e8eaed;
      --muted: #6b7280;
      --accent: #f97316;
      --accent-light: #fb923c;
      --card: #1a2129;
      --border: #2a3441;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --purple: #8b5cf6;
    }
    * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
    body { background: var(--bg); color: var(--fg); min-height: 100vh; margin: 0; }
    .font-display { font-family: 'Bebas Neue', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    
    .splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0c0f12 0%, #1a1f2e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      transition: opacity 0.5s;
    }
    .splash-content { text-align: center; }
    .splash-logo {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 30px auto;
      animation: pulse 1.5s infinite;
    }
    .splash-logo svg { width: 55px; height: 55px; color: white; }
    .splash-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      letter-spacing: 4px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .splash-subtitle { color: var(--muted); font-size: 0.8rem; margin-top: 10px; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    
    /* Demais estilos (mantidos do sistema original) */
    .checklist-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; }
    .form-input { background: var(--bg); border: 1px solid var(--border); color: var(--fg); padding: 8px 12px; border-radius: 8px; width: 100%; font-size: 14px; }
    .form-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(249,115,22,0.15); }
    .btn { font-weight: 600; padding: 10px 18px; border-radius: 8px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; border: none; font-size: 14px; justify-content: center; }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-light)); color: white; }
    .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(249,115,22,0.3); }
    .btn-secondary { background: var(--card); color: var(--fg); border: 1px solid var(--border); }
    .btn-success { background: var(--success); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-warning { background: var(--warning); color: white; }
    .btn-info { background: var(--info); color: white; }
    .btn-yellow { background: #eab308; color: #1e293b; }
    .signature-canvas { border: 2px dashed var(--border); border-radius: 8px; background: white; width: 100%; height: 140px; cursor: crosshair; touch-action: none; }
    .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-light)); transition: width 0.5s ease; }
    .status-badge { padding: 5px 14px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; display: inline-block; text-transform: uppercase; letter-spacing: 0.5px; }
    .status-abertura { background: rgba(59,130,246,0.2); color: #60a5fa; }
    .status-execucao { background: rgba(245,158,11,0.2); color: #fbbf24; }
    .status-finalizacao { background: rgba(16,185,129,0.2); color: #34d399; }
    .status-fechada { background: rgba(139,92,246,0.25); color: #a78bfa; border:1px solid #8b5cf6; }
    .status-aprovada { background: rgba(34,197,94,0.3); color: #4ade80; border:1px solid #22c55e; }
    .toast-center { position: fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:var(--card); border:2px solid var(--success); color:var(--fg); padding:16px 32px; border-radius:16px; font-weight:bold; font-size:0.9rem; z-index:2000; display:none; align-items:center; gap:12px; max-width:90vw; white-space:normal; text-align:center; }
    .toast-center.show { display:flex; animation:fadeInOut 2.5s ease forwards; }
    @keyframes fadeInOut { 0%{opacity:0;transform:translate(-50%,-50%) scale(0.9);} 10%{opacity:1;transform:translate(-50%,-50%) scale(1);} 80%{opacity:1;} 100%{opacity:0;transform:translate(-50%,-50%) scale(0.9);} }
    .tab-button { padding:10px 16px; font-weight:600; background:transparent; border:none; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s; font-size:13px; white-space:nowrap; }
    .tab-button:hover { color:var(--fg); }
    .tab-button.active { color:var(--accent); border-bottom-color:var(--accent); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .photo-preview { display:flex; flex-wrap:wrap; gap:12px; margin-top:12px; }
    .photo-item { position:relative; width:100px; height:100px; border-radius:8px; border:2px solid var(--border); overflow:hidden; background:var(--bg); }
    .photo-item img { width:100%; height:100%; object-fit:cover; }
    .photo-remove { position:absolute; top:2px; right:2px; background:rgba(220,38,38,0.9); border-radius:50%; width:22px; height:22px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:white; font-size:12px; font-weight:bold; }
    .equip-item { background:var(--bg-secondary); border-radius:8px; padding:10px; margin-bottom:8px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    .step-indicator { display:flex; justify-content:space-between; margin-bottom:20px; background:var(--card); border-radius:40px; padding:4px; border:1px solid var(--border); flex-wrap:wrap; }
    .step { flex:1; text-align:center; padding:8px 4px; border-radius:30px; font-weight:600; font-size:9px; transition:all 0.3s; color:var(--muted); }
    .step.active { background:var(--accent); color:white; }
    .step.completed { background:var(--success); color:white; }
    .step.locked { background:var(--purple); color:white; }
    .timer-display { font-size:2rem; font-weight:700; font-family:'JetBrains Mono',monospace; background:linear-gradient(135deg, var(--accent), var(--accent-light)); -webkit-background-clip:text; background-clip:text; color:transparent; letter-spacing:2px; }
    .checklist-item { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; border-radius:8px; background:var(--bg); margin-bottom:6px; flex-wrap:wrap; gap:8px; }
    .checklist-item label { display:flex; align-items:center; gap:10px; cursor:pointer; flex:1; }
    .checklist-item input[type="checkbox"] { width:18px; height:18px; accent-color:var(--accent); cursor:pointer; }
    .action-buttons { display:flex; flex-wrap:wrap; gap:8px; padding:12px; background:var(--bg-secondary); border-radius:12px; margin-top:16px; justify-content:center; }
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; margin-bottom:20px; }
    .stat-card { background:linear-gradient(135deg,var(--card),var(--bg-secondary)); border-radius:12px; padding:10px; text-align:center; border:1px solid var(--border); transition:transform 0.2s; }
    .stat-value { font-size:1.4rem; font-weight:700; font-family:'JetBrains Mono',monospace; }
    .stat-label { font-size:0.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
    .table-os { width:100%; border-collapse:collapse; font-size:12px; }
    .table-os th,.table-os td { padding:8px 6px; text-align:left; border-bottom:1px solid var(--border); }
    .table-os th { background:var(--bg-secondary); font-weight:600; font-size:0.7rem; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); }
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; justify-content:center; align-items:center; }
    .modal-content { background:var(--card); border-radius:16px; padding:20px; max-width:500px; width:90%; max-height:80vh; overflow-y:auto; border:1px solid var(--border); }
    .modal-title { font-size:1.3rem; font-weight:bold; margin-bottom:16px; color:var(--accent); }
    .equip-option { background:var(--bg-secondary); border:1px solid var(--border); border-radius:12px; padding:12px; margin-bottom:10px; cursor:pointer; transition:all 0.2s; }
    .equip-option:hover { border-color:var(--accent); background:var(--card); transform:translateX(5px); }
    .sync-status { position:fixed; bottom:10px; right:10px; background:var(--card); border-radius:30px; padding:6px 12px; font-size:10px; border:1px solid var(--border); z-index:100; display:flex; align-items:center; gap:6px; }
    .top-bar { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; margin-bottom:15px; }
    .user-area { display:flex; align-items:center; gap:12px; background:var(--bg-secondary); padding:6px 16px; border-radius:40px; border:1px solid var(--border); }
    .toolbar { background:var(--card); border-radius:12px; padding:10px 16px; margin-bottom:20px; border:1px solid var(--border); display:flex; flex-wrap:wrap; justify-content:center; gap:8px; }
    .login-container { min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#0c0f12 0%,#1a1f2e 100%); padding:20px; }
    .login-card { background:var(--card); border-radius:24px; padding:30px 24px; width:100%; max-width:400px; border:1px solid var(--border); box-shadow:0 25px 50px -12px rgba(0,0,0,0.5); }
    .login-logo { width:70px; height:70px; background:linear-gradient(135deg,var(--accent),var(--accent-light)); border-radius:20px; display:flex; align-items:center; justify-content:center; margin:0 auto 20px auto; }
    .login-logo svg { width:40px; height:40px; color:white; }
    .login-error { background:rgba(239,68,68,0.2); border:1px solid var(--danger); color:#fca5a5; padding:10px; border-radius:8px; margin-top:12px; text-align:center; font-size:13px; display:none; }
    .journey-step { background:var(--bg-secondary); border-radius:16px; padding:20px; margin-bottom:20px; border-left:4px solid var(--accent); }
    .journey-step.completed { border-left-color: var(--success); opacity:0.8; }
    .journey-step h3 { color:var(--accent); margin-bottom:15px; display:flex; align-items:center; gap:10px; }
    .location-btn { background:var(--info); color:white; border:none; padding:6px 12px; border-radius:8px; cursor:pointer; font-size:12px; }
    .schedule-card { background:var(--bg-secondary); border-radius:12px; padding:15px; margin-bottom:15px; border:1px solid var(--border); }
    .permission-item { background:var(--bg-secondary); border-radius:12px; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; border:1px solid var(--border); }
    .permission-item label { cursor:pointer; font-weight:500; display:flex; align-items:center; gap:10px; }
    .permission-item input { width:20px; height:20px; accent-color:var(--accent); cursor:pointer; }
    @media (max-width:768px){ .step{font-size:8px;padding:6px 2px;} .timer-display{font-size:1.5rem;} .btn{padding:8px 12px;font-size:11px;} .photo-item{width:80px;height:80px;} .stat-value{font-size:1.1rem;} .toolbar{gap:6px;} .toolbar .btn{font-size:10px;padding:6px 8px;} .top-bar{flex-direction:column;text-align:center;} .user-area{margin-top:5px;} .tab-button{padding:8px 12px;font-size:11px;} }
    @media (max-width:480px){ .stats-grid{grid-template-columns:repeat(2,1fr);} .table-os th,.table-os td{padding:6px 4px;font-size:10px;} }
    @media print { .no-print { display:none !important; } body { background:white; color:black; } }
  </style>
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splashScreen" class="splash-screen">
  <div class="splash-content">
    <div class="splash-logo"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg></div>
    <h1 class="splash-title">MARLIFT</h1>
    <p class="splash-subtitle">Sistema de Ordem de Serviço</p>
    <div class="progress-container" style="width:250px; height:3px; background:var(--border); border-radius:3px; overflow:hidden; margin:20px auto;">
      <div id="splashProgress" style="width:0%; height:100%; background:linear-gradient(90deg, var(--accent), var(--accent-light)); transition:width 0.3s;"></div>
    </div>
    <p id="splashStatus" class="text-xs text-[var(--muted)]">Inicializando...</p>
  </div>
</div>

<!-- TELA DE LOGIN -->
<div id="loginScreen" class="login-container" style="display:none;">
  <div class="login-card">
    <div class="login-logo"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg></div>
    <h1 class="font-display text-3xl text-center text-[var(--accent)] mb-2">MARLIFT</h1>
    <p class="text-center text-[var(--muted)] text-sm mb-6">Sistema de Ordem de Serviço</p>
    <div class="space-y-4">
      <div><label class="block text-xs text-[var(--muted)] mb-1">👨🏻‍🔧 Usuário</label><input type="text" id="loginUsername" class="form-input" placeholder="Digite seu usuário" autocomplete="off" autofocus></div>
      <div><label class="block text-xs text-[var(--muted)] mb-1">🔑 Senha</label><input type="password" id="loginPassword" class="form-input" placeholder="Digite sua senha" onkeypress="if(event.key==='Enter') Auth.login()"></div>
      <button onclick="Auth.login()" id="loginButton" class="btn btn-primary w-full"><i class="fas fa-sign-in-alt"></i> Entrar</button>
      <div id="loginErrorMessage" class="login-error"></div>
    </div>
    <div class="mt-6 text-center text-xs text-[var(--muted)]"><p>MARLIFT EMPILHADEIRAS</p><p class="mt-1">Suporte 📲 <strong>(98)98824-8877</strong></p></div>
  </div>
</div>

<!-- MODAL EQUIPAMENTOS -->
<div id="equipModal" class="modal"><div class="modal-content"><div class="modal-title"><i class="fas fa-forklift"></i> Selecione o Equipamento</div><div id="equipList"></div><button onclick="App.fecharModalEquip()" class="btn btn-secondary w-full mt-3">Cancelar</button></div></div>

<!-- SISTEMA PRINCIPAL -->
<div id="appContainer" style="display:none;">
  <!-- Conteúdo completo do sistema (mesmo da versão funcional anterior) -->
  <!-- Por brevidade, incluirei o conteúdo principal, mas o código completo está no final -->
  <div class="p-8 text-center">Carregando sistema...</div>
</div>

<script>
// ==================== CONFIGURAÇÕES ====================
var Config = {
  marcas: ["TOYOTA","CLARK","BYD","PALETRANS","LINDE","HYSTER","YALE","CATERPILLAR","KOMATSU","MITSUBISHI","NISSAN","STILL","CROWN","JUNGHEINRICH","TCM","HYUNDAI","DOOSAN","HELI","HANGCHA","LONKING","OUTRA"],
  checklist: [ { id:'motor', title:'Motor e Componentes', items:[{id:'motor_oleo',label:'Nivel de oleo do motor'},{id:'motor_filtro_oleo',label:'Filtro de oleo'},{id:'motor_filtro_ar',label:'Filtro de ar'},{id:'motor_filtro_comb',label:'Filtro de combustivel'},{id:'motor_correias',label:'Correias'},{id:'motor_radiador',label:'Radiador'}] }, { id:'eletrico', title:'Sistema Eletrico', items:[{id:'eletr_bateria',label:'Bateria'},{id:'eletr_terminais',label:'Terminais'},{id:'eletr_alternador',label:'Alternador'},{id:'eletr_partida',label:'Motor de partida'},{id:'eletr_farois',label:'Farois'},{id:'eletr_buzina',label:'Buzina'}] }, { id:'hidraulico', title:'Sistema Hidraulico', items:[{id:'hidr_oleo',label:'Nivel oleo hidraulico'},{id:'hidr_bomba',label:'Bomba hidraulica'},{id:'hidr_cilindros',label:'Cilindros'},{id:'hidr_vazamentos',label:'Vazamentos'},{id:'hidr_mangueiras',label:'Mangueiras'}] }, { id:'transmissao', title:'Transmissao e Freios', items:[{id:'trans_oleo',label:'Oleo transmissao'},{id:'freio_servico',label:'Freio de servico'},{id:'freio_estac',label:'Freio de estacionamento'},{id:'freio_pastilhas',label:'Pastilhas/Lonas'}] }, { id:'direcao', title:'Direcao', items:[{id:'dir_volante',label:'Volante'},{id:'dir_caixa',label:'Caixa de direcao'},{id:'dir_hidraulica',label:'Direcao hidraulica'}] }, { id:'estrutura', title:'Estrutura e Garfos', items:[{id:'est_mastros',label:'Mastros'},{id:'est_correntes',label:'Correntes'},{id:'est_garfos',label:'Garfos'},{id:'est_roletes',label:'Roletes'}] }, { id:'seguranca', title:'Seguranca', items:[{id:'seg_cinto',label:'Cinto de seguranca'},{id:'seg_extintor',label:'Extintor'},{id:'seg_espelhos',label:'Espelhos'},{id:'seg_alarme',label:'Alarme de re'}] } ],
  maxFotos: 10
};

var State = { 
  currentStatus:'abertura', 
  fotosServico:[], 
  fotoHorimetro:null, 
  fotosPendencias:[], 
  clients:[], 
  osHistory:[], 
  editingClientId:null, 
  hasUnsavedChanges:false,
  osCounter: 0,
  agendamentos: [],
  jornada: {}
};

// ==================== STORAGE ====================
var Storage = {
  saveClients: function() { localStorage.setItem('marlift_clientes', JSON.stringify(State.clients)); },
  loadClients: function() { var data = localStorage.getItem('marlift_clientes'); State.clients = data ? JSON.parse(data) : []; return State.clients; },
  saveOSHistory: function() { localStorage.setItem('marlift_os_history', JSON.stringify(State.osHistory)); },
  loadOSHistory: function() { var data = localStorage.getItem('marlift_os_history'); State.osHistory = data ? JSON.parse(data) : []; return State.osHistory; },
  saveCounter: function() { localStorage.setItem('marlift_os_counter', State.osCounter); },
  loadCounter: function() { var data = localStorage.getItem('marlift_os_counter'); State.osCounter = data ? parseInt(data) : 0; return State.osCounter; },
  saveAgendamentos: function() { localStorage.setItem('marlift_agendamentos', JSON.stringify(State.agendamentos)); },
  loadAgendamentos: function() { var data = localStorage.getItem('marlift_agendamentos'); State.agendamentos = data ? JSON.parse(data) : []; return State.agendamentos; },
  saveJornada: function(login, jornadaData) { var all = localStorage.getItem('marlift_jornadas'); var obj = all ? JSON.parse(all) : {}; obj[login] = jornadaData; localStorage.setItem('marlift_jornadas', JSON.stringify(obj)); },
  loadJornada: function(login) { var all = localStorage.getItem('marlift_jornadas'); var obj = all ? JSON.parse(all) : {}; return obj[login] || null; }
};

// ==================== GOOGLE SHEETS SYNC ====================
const GoogleSheetsSync = {
  webAppUrl: 'https://script.google.com/macros/s/AKfycbwZGVIOlYG2icQ6fuTmSkOjsKUFllIy4jGlXa7TMLy4lHCWpXarWkOyBMGznMqmkxPzYA/exec',
  setStatus: function(msg) { var st=document.getElementById('syncStatusText'); if(st) st.textContent=msg; },
  
  // Busca e mapeia os usuários corretamente
  async fetchUsuarios() {
    try {
      var resp = await fetch(this.webAppUrl);
      var data = await resp.json();
      if(data.success && data.usuarios && data.usuarios.length) {
        // Mapeia as colunas: espera-se que a planilha tenha as colunas:
        // A: id, B: nome, C: login, D: senha, E: nivel
        var usuariosMapeados = data.usuarios.map(function(user) {
          return {
            id: user.id || user[0],
            nome: user.nome || user[1],
            login: user.login || user[2],
            senha: user.senha || user[3],
            nivel: user.nivel || user[4]
          };
        });
        Auth.saveUsers(usuariosMapeados);
        return true;
      }
      return false;
    } catch(e) {
      console.error('Erro ao buscar usuários:', e);
      return false;
    }
  },
  
  async fetchFromSheet() {
    try {
      this.setStatus('Sincronizando...');
      var resp = await fetch(this.webAppUrl);
      var data = await resp.json();
      if(data.success){
        if(data.clientes) { State.clients = data.clientes; Storage.saveClients(); if(Clientes.renderTable) Clientes.renderTable(); if(Clientes.updateStats) Clientes.updateStats(); }
        if(data.os) { State.osHistory = data.os; Storage.saveOSHistory(); if(Historico.render) Historico.render(); if(Historico.updateStats) Historico.updateStats(); }
        if(data.agendamentos) { State.agendamentos = data.agendamentos; Storage.saveAgendamentos(); if(Agendamentos.atualizarLista) Agendamentos.atualizarLista(); }
        if(data.permissoes) { localStorage.setItem('marlift_permissoes_tecnico', JSON.stringify(data.permissoes)); if(Permissoes.carregarNaInterface) Permissoes.carregarNaInterface(); }
        if(data.usuarios) { Auth.saveUsers(data.usuarios); if(UserManager.render) UserManager.render(); }
        this.setStatus('Sincronizado');
        showToast('Dados sincronizados');
      }
    } catch(e){ console.error(e); this.setStatus('Offline'); }
  },
  fullSync: async function() { await this.fetchFromSheet(); }

// ==================== AUTENTICAÇÃO (CORRIGIDA) ====================
var Auth = { 
  currentUser: null,
  
  getUsers: function() { 
    var users = localStorage.getItem('marlift_users'); 
    if(users) return JSON.parse(users); 
    // Usuários padrão
    var defaultUsers = [ 
      { id:1, nome:'Administrador', login:'admin', senha:'admin123', nivel:'admin' }, 
      { id:2, nome:'Técnico Principal', login:'tecnico', senha:'123456', nivel:'tecnico' } 
    ]; 
    localStorage.setItem('marlift_users', JSON.stringify(defaultUsers)); 
    return defaultUsers; 
  },
  
  saveUsers: function(users) { localStorage.setItem('marlift_users', JSON.stringify(users)); },
  
  login: async function() { 
    var loginBtn = document.getElementById('loginButton');
    var originalText = loginBtn.innerHTML;
    loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';
    loginBtn.disabled = true;
    
    var login = document.getElementById('loginUsername').value.trim(); 
    var senha = document.getElementById('loginPassword').value; 
    var errorDiv = document.getElementById('loginErrorMessage');
    
    if(!login||!senha){ 
      errorDiv.style.display = 'block';
      errorDiv.innerHTML = 'Preencha usuário e senha!';
      loginBtn.innerHTML = originalText;
      loginBtn.disabled = false;
      return; 
    } 
    
    // Busca usuários da planilha antes de validar
    await GoogleSheetsSync.fetchUsuarios();
    
    var users = this.getUsers(); 
    var user = users.find(function(u) { return u.login === login && u.senha === senha; }); 
    
    if(!user){ 
      errorDiv.style.display = 'block';
      errorDiv.innerHTML = 'Usuário ou senha inválidos!';
      document.getElementById('loginPassword').value=''; 
      loginBtn.innerHTML = originalText;
      loginBtn.disabled = false;
      return; 
    } 
    
    errorDiv.style.display = 'none';
    this.currentUser = user; 
    localStorage.setItem('marlift_current_user', JSON.stringify(user)); 
    document.getElementById('loginScreen').style.display='none'; 
    document.getElementById('appContainer').style.display='block'; 
    document.getElementById('currentUserName').innerHTML = user.nome; 
    this.updatePermissions(); 
    showToast('Bem-vindo, ' + user.nome + '!'); 
    
    if (typeof App !== 'undefined' && App.init) {
      App.init();
    }
    if(user.nivel === 'tecnico'){ 
      setTimeout(function(){ if(typeof Jornada !== 'undefined') Jornada.carregar(); }, 500); 
    } 
    
    loginBtn.innerHTML = originalText;
    loginBtn.disabled = false;
  },
  
  logout: function() { 
    this.currentUser=null; 
    localStorage.removeItem('marlift_current_user'); 
    if(typeof Timer !== 'undefined' && Timer.cleanup) Timer.cleanup(); 
    document.getElementById('loginScreen').style.display='flex'; 
    document.getElementById('appContainer').style.display='none'; 
    document.getElementById('loginUsername').value = '';
    document.getElementById('loginPassword').value = '';
    document.getElementById('loginErrorMessage').style.display = 'none';
  },
  
  checkSession: function() { 
    var saved = localStorage.getItem('marlift_current_user'); 
    if(saved){ 
      try {
        this.currentUser = JSON.parse(saved); 
        document.getElementById('loginScreen').style.display='none'; 
        document.getElementById('appContainer').style.display='block'; 
        document.getElementById('currentUserName').innerHTML = this.currentUser.nome; 
        this.updatePermissions(); 
        return true; 
      } catch(e) {
        return false;
      }
    } 
    return false; 
  },
  
  updatePermissions: function() { 
    if(!this.currentUser) return; 
    var isAdmin = this.currentUser.nivel === 'admin'; 
    var isTecnico = this.currentUser.nivel === 'tecnico'; 
    var tabAgendamentos = document.getElementById('tabAgendamentosBtn'); 
    var tabJornada = document.getElementById('tabJornadaBtn'); 
    var tabPermissoes = document.getElementById('tabPermissoesBtn'); 
    var tabUsuarios = document.getElementById('tabUsuariosBtn'); 
    if(tabAgendamentos) tabAgendamentos.style.display = isAdmin ? 'inline-flex' : 'none'; 
    if(tabJornada) tabJornada.style.display = isTecnico ? 'inline-flex' : 'none'; 
    if(tabPermissoes) tabPermissoes.style.display = isAdmin ? 'inline-flex' : 'none'; 
    if(tabUsuarios) tabUsuarios.style.display = isAdmin ? 'inline-flex' : 'none'; 
  },
  isAdmin: function() { return this.currentUser && this.currentUser.nivel === 'admin'; }
};

var Timer = { interval:null, seconds:0, running:false, paused:false,
  control: function(a){ if(a==='start') this.start(); else if(a==='pause') this.pause(); else if(a==='stop') this.stop(); },
  start: function(){ if(this.running && !this.paused) return; if(this.paused){ if(!Utils.getVal('horaAlmocoRetorno')){ var n=new Date(); Utils.setVal('horaAlmocoRetorno', n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})); } this.paused=false; this.running=true; } else { this.running=true; this.paused=false; if(this.seconds===0) this.reset(); if(!Utils.getVal('horaInicio')){ var n=new Date(); Utils.setVal('horaInicio', n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})); } } if(this.interval) clearInterval(this.interval); var self=this; this.interval=setInterval(function(){ if(!self.paused && self.running){ self.seconds++; self.updateDisplay(); } },1000); },
  pause: function(){ if(!this.running) return; this.paused=true; if(!Utils.getVal('horaAlmocoSaida')){ var n=new Date(); Utils.setVal('horaAlmocoSaida', n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})); } },
  stop: function(){ if(!this.running) return; clearInterval(this.interval); this.running=false; this.paused=false; if(!Utils.getVal('horaTermino')){ var n=new Date(); Utils.setVal('horaTermino', n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})); } Horas.calcular(); },
  reset: function(){ this.seconds=0; var d=$('timerDisplay'); if(d) d.textContent='00:00:00'; },
  updateDisplay: function(){ var h=Math.floor(this.seconds/3600), m=Math.floor((this.seconds%3600)/60), s=this.seconds%60; var d=$('timerDisplay'); if(d) d.textContent=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'); },
  cleanup: function(){ if(this.interval){ clearInterval(this.interval); this.interval=null; } }
};

var Horas = { 
  calcular: function(){ var i=Utils.getVal('horaInicio'), t=Utils.getVal('horaTermino'); if(!i||!t) return 0; var total=Utils.timeDiff(i,t); var saida=Utils.getVal('horaAlmocoSaida'), retorno=Utils.getVal('horaAlmocoRetorno'); if(saida&&retorno) total-=Utils.timeDiff(saida,retorno); var horas=Math.ceil(total/60); if(horas<1) horas=1; Utils.setVal('horasTotais',horas+'h'); this.updateTotal(); return horas; },
  updateTotal: function(){ var hs=Utils.getVal('horasTotais'); var min=0; if(hs){ var m=hs.match(/(\d+)h/); if(m) min=parseInt(m[1])*60; } var extra=Utils.timeToMinutes(Utils.getVal('horasExtras')), not=Utils.timeToMinutes(Utils.getVal('adicionalNoturno')); var total=min+extra+not; var h=Math.floor(total/60), m=total%60; Utils.setVal('totalGeral', String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')); },
  initListeners: function(){ var self=this; ['horaInicio','horaTermino','horaAlmocoSaida','horaAlmocoRetorno'].forEach(function(id){ var el=$(id); if(el) el.addEventListener('change',function(){ self.calcular(); }); }); var extras=$('horasExtras'); if(extras) extras.addEventListener('input',function(){ self.updateTotal(); }); var noturno=$('adicionalNoturno'); if(noturno) noturno.addEventListener('input',function(){ self.updateTotal(); }); }
};

// ==================== FOTOS ====================
var Fotos = {
  compressFile: function(file) { 
    return new Promise(function(resolve, reject) { 
      var reader = new FileReader(); 
      reader.onload = function(ev) { 
        var img = new Image(); 
        img.src = ev.target.result; 
        img.onload = function() { 
          var canvas = document.createElement('canvas'); 
          var w=800, h=600, ratio = Math.min(w/img.width, h/img.height); 
          var nw = img.width*ratio, nh = img.height*ratio; 
          canvas.width=nw; canvas.height=nh; 
          var ctx=canvas.getContext('2d'); 
          ctx.fillStyle='#fff'; ctx.fillRect(0,0,nw,nh); 
          ctx.drawImage(img,0,0,nw,nh); 
          resolve(canvas.toDataURL('image/jpeg',0.7)); 
        }; 
        img.onerror=reject; 
      }; 
      reader.readAsDataURL(file); 
    }); 
  },
  compress: function(b64){ return Promise.resolve(b64); },
  init: function() { 
    var fotoHorimetroInput = document.getElementById('fotoHorimetroInput');
    if(fotoHorimetroInput) {
      fotoHorimetroInput.addEventListener('change', async function(e) {
        var file = e.target.files[0];
        if(file && file.type.startsWith('image/')) {
          var reader = new FileReader();
          reader.onload = async function(ev) {
            try {
              State.fotoHorimetro = await Fotos.compress(ev.target.result);
              var preview = document.getElementById('fotoHorimetroPreview');
              if(preview) preview.innerHTML = '<div class="photo-item"><img src="'+State.fotoHorimetro+'"><div class="photo-remove" onclick="Fotos.removeHorimetro()">x</div></div>';
              State.hasUnsavedChanges = true;
              showToast('Foto carregada');
            } catch(err) { showToast('Erro ao processar',true); }
          };
          reader.readAsDataURL(file);
        }
      });
    }
    var fotosServico = document.getElementById('fotosServico');
    if(fotosServico) {
      fotosServico.addEventListener('change', async function(e) {
        var files = Array.from(e.target.files);
        if(State.fotosServico.length + files.length > Config.maxFotos) {
          showToast('Máximo de '+Config.maxFotos+' fotos.',true);
          return;
        }
        var preview = document.getElementById('fotosPreview');
        for(var i=0; i<files.length; i++) {
          var file = files[i];
          if(!file.type.startsWith('image/')) continue;
          var reader = new FileReader();
          await new Promise(function(resolve) {
            reader.onload = async function(ev) {
              try {
                var compressed = await Fotos.compress(ev.target.result);
                State.fotosServico.push(compressed);
                if(preview) {
                  var div = document.createElement('div');
                  div.className = 'photo-item';
                  div.innerHTML = '<img src="'+compressed+'"><div class="photo-remove" onclick="Fotos.removeServico(this)">x</div>';
                  preview.appendChild(div);
                }
              } catch(err) { console.error(err); }
              resolve();
            };
            reader.readAsDataURL(file);
          });
        }
        fotosServico.value = '';
        State.hasUnsavedChanges = true;
      });
    }
    var fotosPendencias = document.getElementById('fotosPendenciasInput');
    if(fotosPendencias) {
      fotosPendencias.addEventListener('change', async function(e) {
        var files = Array.from(e.target.files);
        if(State.fotosPendencias.length + files.length > Config.maxFotos) {
          showToast('Máximo de '+Config.maxFotos+' fotos de pendências.',true);
          return;
        }
        var preview = document.getElementById('fotosPendenciasPreview');
        for(var i=0; i<files.length; i++) {
          var file = files[i];
          if(!file.type.startsWith('image/')) continue;
          var reader = new FileReader();
          await new Promise(function(resolve) {
            reader.onload = async function(ev) {
              try {
                var compressed = await Fotos.compress(ev.target.result);
                State.fotosPendencias.push(compressed);
                if(preview) {
                  var div = document.createElement('div');
                  div.className = 'photo-item';
                  div.innerHTML = '<img src="'+compressed+'"><div class="photo-remove" onclick="Fotos.removePendencia(this)">x</div>';
                  preview.appendChild(div);
                }
              } catch(err) { console.error(err); }
              resolve();
            };
            reader.readAsDataURL(file);
          });
        }
        fotosPendencias.value = '';
        State.hasUnsavedChanges = true;
      });
    }
  },
  removeHorimetro: function() { State.fotoHorimetro = null; var inp = document.getElementById('fotoHorimetroInput'); if(inp) inp.value = ''; var preview = document.getElementById('fotoHorimetroPreview'); if(preview) preview.innerHTML = ''; },
  removeServico: function(el) { var container = el.parentNode.parentNode; var idx = Array.from(container.children).indexOf(el.parentNode); if(idx !== -1) { State.fotosServico.splice(idx, 1); el.parentNode.remove(); } },
  removePendencia: function(el) { var container = el.parentNode.parentNode; var idx = Array.from(container.children).indexOf(el.parentNode); if(idx !== -1) { State.fotosPendencias.splice(idx, 1); el.parentNode.remove(); } }

// ==================== JORNADA ====================
var Jornada = {
  carregar: function() { 
    if(!Auth.currentUser || Auth.currentUser.nivel !== 'tecnico') return; 
    var saved = Storage.loadJornada(Auth.currentUser.login); 
    if(saved){ State.jornada = saved; } else { State.jornada = { etapa: 'inicio', dados: {} }; Storage.saveJornada(Auth.currentUser.login, State.jornada); } 
    this.renderizar(); 
  },
  renderizar: function() { 
    var container = document.getElementById('jornadaSteps'); 
    var statusDiv = document.getElementById('jornadaStatus'); 
    if(!container) return; 
    statusDiv.innerHTML = '<i class="fas fa-info-circle"></i> Registre os passos da sua jornada.';
    var dados = State.jornada.dados || {}; 
    var html = '<div class="journey-step"><h3><i class="fas fa-play-circle"></i> 1. Início</h3><div class="grid grid-cols-2 gap-3"><div><label>Placa</label><input type="text" id="jornada_placa_inicio" class="form-input" value="'+(dados.inicio?.placa||'')+'"></div><div><label>KM</label><input type="number" id="jornada_km_inicio" class="form-input" value="'+(dados.inicio?.km||'')+'"></div></div><div class="mt-2"><button onclick="Jornada.obterLocalizacao(\'inicio\')" class="location-btn"><i class="fas fa-map-marker-alt"></i> Localização</button> <span id="localizacao_inicio_texto" class="text-xs">'+(dados.inicio?.localizacao||'Não obtida')+'</span></div><div class="mt-2"><label>Foto</label><input type="file" id="jornada_foto_inicio" accept="image/*"></div><button onclick="Jornada.salvarEtapa(\'inicio\')" class="btn btn-primary mt-3">Registrar</button></div>';
    html += '<div class="journey-step"><h3><i class="fas fa-flag-checkered"></i> 2. Chegada</h3><div><button onclick="Jornada.obterLocalizacao(\'chegada\')" class="location-btn">Localização</button> <span id="localizacao_chegada_texto" class="text-xs">'+(dados.chegada?.localizacao||'Não obtida')+'</span></div><div class="mt-2"><label>Foto</label><input type="file" id="jornada_foto_chegada" accept="image/*"></div><button onclick="Jornada.salvarEtapa(\'chegada\')" class="btn btn-primary mt-3">Registrar</button></div>';
    html += '<div class="journey-step"><h3><i class="fas fa-stop-circle"></i> 3. Finalização</h3><div class="grid grid-cols-2 gap-3"><div><label>Placa (retorno)</label><input type="text" id="jornada_placa_final" value="'+(dados.final?.placa||'')+'"></div><div><label>KM final</label><input type="number" id="jornada_km_final" value="'+(dados.final?.km||'')+'"></div></div><div><button onclick="Jornada.obterLocalizacao(\'final\')" class="location-btn">Localização</button> <span id="localizacao_final_texto" class="text-xs">'+(dados.final?.localizacao||'Não obtida')+'</span></div><div class="mt-2"><label>Foto</label><input type="file" id="jornada_foto_final" accept="image/*"></div><button onclick="Jornada.salvarEtapa(\'final\')" class="btn btn-primary mt-3">Registrar</button></div>';
    container.innerHTML = html;
  },
  obterLocalizacao: function(etapa) { 
    if(!navigator.geolocation){ showToast('Geolocalização não suportada',true); return; } 
    navigator.geolocation.getCurrentPosition(function(pos) { 
      var texto = pos.coords.latitude.toFixed(6)+', '+pos.coords.longitude.toFixed(6); 
      var span = document.getElementById('localizacao_'+etapa+'_texto'); 
      if(span) span.innerHTML = texto; 
      if(!State.jornada.dados[etapa]) State.jornada.dados[etapa] = {}; 
      State.jornada.dados[etapa].localizacao = texto; 
      Storage.saveJornada(Auth.currentUser.login, State.jornada); 
      showToast('Localização obtida'); 
    }, function(err) { showToast('Erro: '+err.message, true); }); 
  },
  salvarEtapa: async function(etapa) { 
    var dados = State.jornada.dados;
    if(etapa === 'inicio') {
      var placa = document.getElementById('jornada_placa_inicio').value;

  coletarDados: function() { var data={}; document.querySelectorAll('#tab-os input, #tab-os select, #tab-os textarea').forEach(el=>{ if(el.id && el.type!=='file') data[el.id]=el.value; }); var checklistData=Checklist.getChecklistData(); Object.assign(data,checklistData); var marcaSelect=$('marcaSelect').value, marcaOutra=$('marcaOutra').value; data.marca=marcaSelect==='OUTRA'?marcaOutra.toUpperCase():marcaSelect; return data; },
  salvar: async function() { Signature.save('tec'); Signature.save('cli'); var data=this.coletarDados(); data.status=State.currentStatus; data.fotosBase64=State.fotosServico; data.fotoHorimetro=State.fotoHorimetro; data.fotosPendencias=State.fotosPendencias; data.assinaturaTecnico=Utils.getVal('assinaturaTecnicoData'); data.assinaturaCliente=Utils.getVal('assinaturaClienteData'); data.checklistData=Checklist.getChecklistData(); Horas.calcular(); data.horasTotais=Utils.getVal('horasTotais'); data.totalGeral=Utils.getVal('totalGeral'); if(!data.numeroOS) data.numeroOS=Utils.generateOSNumber(); try { var idx=State.osHistory.findIndex(os=>os.numeroOS===data.numeroOS); if(idx>=0) State.osHistory[idx]=data; else State.osHistory.unshift(data); Storage.saveOSHistory(); State.hasUnsavedChanges=false; Historico.updateStats(); Clientes.updateStats(); return true; } catch(e){ showToast('Erro ao salvar',true); return false; } },
  salvarOSManual: async function() { var ok=await this.salvar(); if(ok){ showToast('OS salva'); Historico.render(); } },
  mudarStatus: async function(novoStatus) { if(novoStatus==='abertura'){ if(!Utils.getVal('numeroOS')){ showToast('Clique em Nova OS primeiro',true); return; } if(!Utils.getVal('cliente').trim()){ showToast('Cliente obrigatório',true); return; } } if(novoStatus==='execucao' && State.currentStatus!=='abertura'){ showToast('Precisa estar em ABERTURA',true); return; } if(novoStatus==='finalizacao' && State.currentStatus!=='execucao'){ showToast('Precisa estar em EXECUÇÃO',true); return; } if(novoStatus==='fechada' && State.currentStatus!=='finalizacao'){ showToast('Precisa estar FINALIZANDO',true); return; } if(novoStatus==='aprovada'){ if(State.currentStatus!=='fechada'){ showToast('Precisa estar FECHADA',true); return; } if(!Utils.getVal('assinaturaClienteData')){ showToast('Cliente deve assinar',true); return; } if(!Utils.getVal('recebedor').trim()){ showToast('Nome do recebedor',true); return; } } State.currentStatus=novoStatus; if(novoStatus==='finalizacao'||novoStatus==='fechada') Horas.calcular(); var ok=await this.salvar(); if(ok){ this.updateUI(); Historico.render(); showToast('Status: '+Utils.formatStatus(novoStatus)); } },
  iniciarExecucao: function() { if(State.currentStatus!=='abertura') return; this.mudarStatus('execucao'); Timer.control('start'); showToast('Execução iniciada'); },
  finalizarServico: function() { if(State.currentStatus!=='execucao') return; var horimetro=Utils.getVal('horimetro'); if(!horimetro){ showToast('Horímetro obrigatório',true); return; } if(!Utils.validarHorimetro(horimetro)){ showToast('Horímetro inválido',true); return; } Timer.control('stop'); Horas.calcular(); this.mudarStatus('finalizacao'); showToast('Serviço finalizado'); },
  fecharOS: function() { if(State.currentStatus!=='finalizacao') return; var descricao=Utils.getVal('descricaoServico').trim(); if(!descricao){ showToast('Descreva o serviço',true); return; } var horimetro=Utils.getVal('horimetro'); if(!horimetro){ showToast('Horímetro obrigatório',true); return; } Horas.calcular(); if(!confirm('Fechar OS?')) return; this.mudarStatus('fechada'); showToast('OS fechada'); },
  novaOS: function() { if(State.hasUnsavedChanges && !confirm('Há alterações não salvas. Criar nova OS?')) return; State.currentStatus='abertura'; State.fotosServico=[]; State.fotoHorimetro=null; State.fotosPendencias=[]; State.hasUnsavedChanges=false; document.querySelectorAll('#tab-os input, #tab-os select, #tab-os textarea').forEach(el=>{if(el.id && el.type!=='file') el.value='';}); Utils.setDefaultDate(); document.querySelectorAll('input[data-check="true"]').forEach(cb=>cb.checked=false); Checklist.updateProgress(); $('fotosPreview').innerHTML=''; $('fotoHorimetroPreview').innerHTML=''; $('fotosPendenciasPreview').innerHTML=''; $('fotosServico').value=''; $('fotoHorimetroInput').value=''; $('fotosPendenciasInput').value=''; Signature.clear('tec'); Signature.clear('cli'); Timer.reset(); Timer.seconds=0; Timer.running=false; Timer.paused=false; if(Timer.interval) clearInterval(Timer.interval); Utils.generateOSNumber(); this.updateUI(); showToast('Nova OS criada'); var tabClientesBtn = document.querySelector('.tab-button[data-tab="tab-clientes"]'); if(tabClientesBtn) tabClientesBtn.click(); },
  getResumoEmail: function() { return `MARLIFT EMPILHADEIRAS\nOS: ${Utils.getVal('numeroOS')}\nCliente: ${Utils.getVal('cliente')}\nEquipamento: ${Utils.getVal('marca')} ${Utils.getVal('modelo')}\nHoras: ${Utils.getVal('horasTotais')}\nServiço: ${Utils.getVal('descricaoServico')}`; },
  enviarEmailComResumo: function() { if(State.currentStatus!=='aprovada'){ showToast('Somente OS aprovadas',true); return; } var email = prompt('E-mail do cliente:'); if(email && email.includes('@')){ window.location.href = `mailto:${email}?subject=MARLIFT OS ${Utils.getVal('numeroOS')}&body=${encodeURIComponent(this.getResumoEmail())}`; showToast('Abrindo e-mail'); } },
  gerarPreviaPDF: function() { if(State.currentStatus!=='aprovada'){ showToast('Somente OS aprovadas',true); return; } var win = window.open(); win.document.write('<html><head><title>OS '+Utils.getVal('numeroOS')+'</title></head><body><pre>'+this.getResumoEmail()+'</pre></body></html>'); win.document.close(); win.print(); },
  sendWhatsAppMessage: function() { var numero = prompt('WhatsApp com DDD:', Utils.getVal('whatsappCliente')); if(numero){ window.open(`https://wa.me/${numero.replace(/\D/g,'')}?text=${encodeURIComponent(this.getResumoEmail())}`); } },
  abrirMapa: function() { var end = Utils.getVal('endereco'); if(end) window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(end)}`); else showToast('Informe o endereço',true); },
  fecharModalEquip: function() { $('equipModal').style.display='none'; },
  mostrarModalEquipamentos: function(cliente) { var modal=$('equipModal'), equipList=$('equipList'); equipList.innerHTML=''; if(cliente.equipamentos && cliente.equipamentos.length){ cliente.equipamentos.forEach(eq=>{ var div=document.createElement('div'); div.className='equip-option'; div.innerHTML=`<div><strong><i class="fas fa-forklift"></i> ${eq.marca||'N/A'} ${eq.modelo||''}</strong></div><div>${eq.serie||''} | Qtd: ${eq.qtd||1}</div>`; div.onclick=()=>{ App.carregarEquipamento(eq,cliente); modal.style.display='none'; }; equipList.appendChild(div); }); } else { equipList.innerHTML='<div class="text-center py-4">Nenhum equipamento</div>'; var btn=document.createElement('button'); btn.className='btn btn-primary w-full mt-2'; btn.innerHTML='Carregar apenas cliente'; btn.onclick=()=>{ Utils.setVal('cliente',cliente.nome); Utils.setVal('cnpj',cliente.cnpj); Utils.setVal('cidadeCliente',cliente.cidade); Utils.setVal('endereco',cliente.endereco); Utils.setVal('whatsappCliente',cliente.whatsapp); showToast('Cliente carregado'); modal.style.display='none'; }; equipList.appendChild(btn); } modal.style.display='flex'; },
  carregarEquipamento: function(equip,cliente) { Utils.setVal('cliente',cliente.nome); Utils.setVal('cnpj',cliente.cnpj); Utils.setVal('cidadeCliente',cliente.cidade); Utils.setVal('endereco',cliente.endereco); Utils.setVal('whatsappCliente',cliente.whatsapp); var selectMarca=$('marcaSelect'); if(selectMarca){ var marcaEquip=equip.marca||''; if(Config.marcas.indexOf(marcaEquip)!==-1){ selectMarca.value=marcaEquip; $('marcaOutraDiv').style.display='none'; } else if(marcaEquip){ selectMarca.value='OUTRA'; Utils.setVal('marcaOutra',marcaEquip); $('marcaOutraDiv').style.display='block'; } } Utils.setVal('modelo',equip.modelo||''); Utils.setVal('numSerie',equip.serie||''); if(equip.combustivel) Utils.setVal('combustivel',equip.combustivel); showToast('Equipamento carregado'); }
};

function adicionarCampoEquipamento(marca, modelo, serie, qtd, combustivel) {
  marca=marca||''; modelo=modelo||''; serie=serie||''; qtd=qtd||1; combustivel=combustivel||'';
  var container=$('equipamentosList'); if(!container) return;
  var div=document.createElement('div'); div.className='equip-item';
  var options='<option value="">Selecione</option>';
  Config.marcas.forEach(m=>{ if(m!=='OUTRA') options+=`<option value="${m}"${marca===m?' selected':''}>${m}</option>`; });
  options+=`<option value="OUTRA"${marca==='OUTRA'?' selected':''}>OUTRA</option>`;
  div.innerHTML=`<select class="form-input w-28 equip-marca">${options}</select><div class="outra-marca-container" style="display:${marca==='OUTRA'?'block':'none'}"><input type="text" placeholder="Digite a marca" class="form-input w-28 outra-marca" value="${marca==='OUTRA'?'':marca}"></div><input type="text" placeholder="Modelo" class="form-input w-28 equip-modelo" value="${modelo}"><input type="text" placeholder="Série" class="form-input w-28 equip-serie" value="${serie}"><input type="number" placeholder="Qtd" class="form-input w-20 equip-qtd" value="${qtd}"><select class="form-input w-28 equip-combustivel"><option value="">Combustível</option><option value="eletrico"${combustivel==='eletrico'?' selected':''}>Elétrico</option><option value="diesel"${combustivel==='diesel'?' selected':''}>Diesel</option><option value="gasolina"${combustivel==='gasolina'?' selected':''}>Gasolina</option><option value="glp"${combustivel==='glp'?' selected':''}>GLP</option></select><button type="button" class="text-red-500" onclick="this.parentElement.remove()"><i class="fas fa-trash"></i></button>`;
  container.appendChild(div);
  var select=div.querySelector('.equip-marca'), outraDiv=div.querySelector('.outra-marca-container');
  select.addEventListener('change',()=>{ outraDiv.style.display=select.value==='OUTRA'?'block':'none'; if(select.value!=='OUTRA'){ var outraInput=div.querySelector('.outra-marca'); if(outraInput) outraInput.value=''; } });
}

// ==================== INICIALIZAÇÃO ====================
async function initSystem() {
  var splash = document.getElementById('splashScreen');
  var progress = document.getElementById('splashProgress');
  var statusText = document.getElementById('splashStatus');
  
  statusText.innerHTML = 'Carregando configurações...';
  progress.style.width = '20%';
  await new Promise(r => setTimeout(r, 200));
  
  statusText.innerHTML = 'Buscando usuários da planilha...';
  progress.style.width = '50%';
  await GoogleSheetsSync.fetchUsuarios();
  
  statusText.innerHTML = 'Verificando sessão...';
  progress.style.width = '80%';
  await new Promise(r => setTimeout(r, 300));
  
  statusText.innerHTML = 'Iniciando sistema...';
  progress.style.width = '100%';
  await new Promise(r => setTimeout(r, 300));
  
  splash.style.transition = 'opacity 0.5s';
  splash.style.opacity = '0';
  setTimeout(function() {
    splash.style.display = 'none';
    if (Auth.checkSession()) {
      App.init();
    } else {
      document.getElementById('loginScreen').style.display = 'flex';
    }
  }, 500);
}

document.addEventListener('DOMContentLoaded', function() { 
  initSystem();
});
</script>
